<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ben 10 Alien Generator</title>
<link rel="stylesheet" href="ben.css">
</head>
<body>

<h1>🟢 Ben 10 Alien Generator</h1>

<div class="controls">
  <button id="randomBtn">🔄 Omnitrix</button>
  <input type="text" id="searchInput" placeholder="Search alien...">
</div>

<!-- Random Alien Display -->
<div class="alien-card" id="randomAlienCard">
  <img id="alienImg" />
  <h2 id="alienName"></h2>
  <p id="alienSpecies"></p>
</div>

<!-- Grid View -->
<h2>All Aliens</h2>
<div class="alien-grid" id="alienGrid"></div>

<script src="ben.js"></script>
</body>
</html>
